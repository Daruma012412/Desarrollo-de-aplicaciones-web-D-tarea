<form id="formPedido">

    <div class="row g-3">

        <div class="col-md-6">

            <label class="form-label">Nombre del cliente</label>

            <input
                type="text"
                id="cliente"
                class="form-control"
                placeholder="Ingrese el nombre">

            <small id="errorCliente" class="text-danger"></small>

        </div>

        <div class="col-md-6">

            <label class="form-label">Título del pedido</label>

            <input
                type="text"
                id="producto"
                class="form-control"
                placeholder="Ej. Pastel de chocolate">

            <small id="errorProducto" class="text-danger"></small>

        </div>

        <div class="col-12">

            <label class="form-label">Descripción</label>

            <textarea
                id="descripcion"
                class="form-control"
                rows="3"
                placeholder="Escriba los detalles del pedido"></textarea>

            <small id="errorDescripcion" class="text-danger"></small>

        </div>

        <div class="col-md-6">

            <label class="form-label">Categoría</label>

            <select
                id="categoria"
                class="form-select">

                <option value="">Seleccione una categoría</option>
                <option>Pan tradicional</option>
                <option>Pastel</option>
                <option>Postre</option>
                <option>Bebida</option>

            </select>

            <small id="errorCategoria" class="text-danger"></small>

        </div>

        <div class="col-md-6 d-flex align-items-end">

            <button
                type="submit"
                class="btn btn-secondary w-100">

                Registrar Pedido

            </button>

        </div>

    </div>

</form>

<div id="mensaje" class="mt-3"></div>

<h4 class="mt-4">

    Pedidos registrados:
    <span id="total">0</span>

</h4>

<div id="listaPedidos"></div>
