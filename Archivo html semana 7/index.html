<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panadería Chinchina</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- ========================= -->
    <!-- FUTURO base.html -->
    <!-- Encabezado -->
    <!-- ========================= -->

    <header class="bg-secondary text-white text-center p-4">
        <h1>Panadería Chinchina</h1>
        <p>Sistema de Gestión de Pedidos</p>
    </header>

    <!-- Menú -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Inicio</a>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="container my-5">

        <div class="card shadow">

            <div class="card-body">

                <h3 class="text-center mb-4">
                    Registro de Pedidos
                </h3>

                <form id="formPedido">

                    <div class="row g-3">

                        <div class="col-md-6">

                            <label class="form-label">
                                Nombre del cliente
                            </label>

                            <input
                                type="text"
                                id="cliente"
                                class="form-control"
                                placeholder="Ingrese el nombre">

                            <small id="errorCliente" class="text-danger"></small>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Título del pedido
                            </label>

                            <input
                                type="text"
                                id="producto"
                                class="form-control"
                                placeholder="Ej. Pastel de chocolate">

                            <small id="errorProducto" class="text-danger"></small>

                        </div>

                        <div class="col-12">

                            <label class="form-label">
                                Descripción
                            </label>

                            <textarea
                                id="descripcion"
                                class="form-control"
                                rows="3"
                                placeholder="Escriba los detalles del pedido"></textarea>

                            <small id="errorDescripcion" class="text-danger"></small>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Categoría
                            </label>

                            <select
                                id="categoria"
                                class="form-select">

                                <option value="">
                                    Seleccione una categoría
                                </option>

                                <option>Pan tradicional</option>
                                <option>Pastel</option>
                                <option>Postre</option>
                                <option>Bebida</option>

                            </select>

                            <small id="errorCategoria" class="text-danger"></small>

                        </div>

                        <div class="col-md-6 d-flex align-items-end">

                            <button
                                type="submit"
                                class="btn btn-secondary w-100">

                                Registrar Pedido

                            </button>

                        </div>

                    </div>

                </form>

                <div id="mensaje" class="mt-3"></div>

            </div>

        </div>

        <div class="mt-5">

            <h4 class="mb-3">
                Pedidos registrados:
                <span id="total">0</span>
            </h4>

            <!-- Contenido dinámico generado desde JavaScript -->
            <div id="listaPedidos" class="row gy-3"></div>

        </div>

    </main>

    <!-- Pie de página -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2026 Panadería Chinchina
    </footer>

    <script src="script.js"></script>

</body>

</html>
